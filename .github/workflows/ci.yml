name: DeployLab CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: deploylab
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_URL: jdbc:mysql://127.0.0.1:3306/deploylab
      DB_USERNAME: root
      DB_PASSWORD: root123

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Give Maven Wrapper execute permission
        run: chmod +x mvnw

      - name: Run Maven tests
        run: ./mvnw clean test

      - name: Package application
        run: ./mvnw package -DskipTests

      - name: Build Docker image
        run: docker build -t deploylab-app:${{ github.sha }} .